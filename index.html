        // --- Helper Functions ---

        const generateWeaponCode = (w) => {
            if (!w.range || !w.type || !w.power) return '---';
            return `${w.isDouble ? '2x ' : ''}${w.range}${w.type}${w.power}${w.subtype || ''}`;
        };

        const getModuleRule = (mod) => {
            let parts = [];
            if (mod.isDouble) parts.push('DOUBLE: Two in one slot (+1pt)');
            if (mod.category === 'WEAPON') {
                const r = WEAPON_RANGES.find(x => x.id === mod.range);
                const t = WEAPON_TYPES.find(x => x.id === mod.type);
                const s = WEAPON_SUBTYPES.find(x => x.id === mod.subtype);
                if (r && r.rule) parts.push(r.rule);
                if (t && t.rule) parts.push(t.rule);
                if (s && s.rule) parts.push(s.rule);
            } else if (mod.category === 'BRAWL') {
                const b = BRAWL_WEAPONS.find(x => x.id === mod.brawlId);
                if (b) parts.push(b.rule);
                const s = WEAPON_SUBTYPES.find(x => x.id === mod.subtype);
                if (s && s.rule) parts.push(s.rule);
            } else if (mod.category === 'HW') {
                const h = HARDWARE.find(x => x.name === mod.hwName);
                if (h) parts.push(h.rule);
            }
            return parts.join(' | ');
        };

        const calculateCost = (unit) => {
            const typeInfo = UNIT_TYPES[unit.type];
            if (!typeInfo) return 0;

            if (typeInfo.type === 'ASSET') {
                const asset = REMOTE_ASSETS.find(a => a.name === unit.assetName);
                return (asset ? asset.cost : 0) * (unit.count || 1);
            }

            let cost = typeInfo.baseCost;
            let hardwareCount = 0;
            let weaponPowerSum = 0;

            if (unit.modules) {
                unit.modules.forEach(mod => {
                    let modCost = 0;
                    if (mod.category === 'HW') {
                        hardwareCount++;
                        if (mod.hwName === 'Frame' && typeInfo.type === 'MAC') {
                            cost -= 1;
                        }
                    } else if (mod.category === 'WEAPON') {
                        weaponPowerSum += parseInt(mod.power) || 0;
                    } else if (mod.category === 'BRAWL') {
                        weaponPowerSum += 1; 
                    }
                    
                    if (mod.isDouble) {
                        cost += 1; 
                    }
                });
            }

            if (typeInfo.type === 'AU') {
                cost += hardwareCount + weaponPowerSum;
            }

            return Math.max(0, cost) * (unit.count || 1);
        };

        const getFormationLimit = (typeId) => {
            if (typeId === 'INF') return 5;
            if (typeId === 'VEH') return 3;
            if (typeId === 'REMOTE') return 3; // Allowing multiple asset stacks
            return 1;
        };

        const checkValidation = (unit) => {
            const errors = [];
            const typeInfo = UNIT_TYPES[unit.type];
            
            if (!typeInfo || typeInfo.type === 'ASSET') return errors;
            
            if (typeInfo.type === 'MAC') {
                unit.modules.forEach((mod, idx) => {
                    if (mod.category === 'WEAPON') {
                        const power = parseInt(mod.power) || 0;
                        
                        if (mod.isSlot0) {
                             errors.push("Slot 0 must be Hardware.");
                        } else {
                            const slotNum = mod.isSlot0 ? 0 : (unit.modules[0].isSlot0 ? idx : idx + 1);

                            if (slotNum === 1) {
                                if (power > typeInfo.maxMain) errors.push(`Slot 1 Power ${power} exceeds Class limit (${typeInfo.maxMain})`);
                            } else if (slotNum > 1) {
                                if (power > typeInfo.maxSub) errors.push(`Slot ${slotNum} Power ${power} exceeds Class limit (${typeInfo.maxSub})`);
                            }
                        }
                    }
                });
            } else {
                let weaponCount = 0;
                unit.modules.forEach(mod => {
                    if (mod.category === 'WEAPON' || mod.category === 'BRAWL') {
                        weaponCount++;
                        const power = parseInt(mod.power) || (mod.category === 'BRAWL' ? 1 : 0);
                        if (power > typeInfo.maxSub) errors.push(`Weapon Power ${power} exceeds limit (${typeInfo.maxSub})`);
                    }
                });
                if (weaponCount > 2) errors.push('AUs cannot have more than 2 weapons');
            }

            // Duplicate Check
            const counts = {};
            unit.modules.forEach(mod => {
                let key = null;
                if (mod.category === 'WEAPON') key = generateWeaponCode(mod).replace('2x ', ''); // Base key only
                else if (mod.category === 'HW') key = mod.hwName;
                else if (mod.category === 'BRAWL') key = mod.brawlId;
                
                if (key && mod.category !== 'EMPTY') {
                    const increment = mod.isDouble ? 2 : 1;
                    counts[key] = (counts[key] || 0) + increment;
                }
            });

            const maxDupes = typeInfo.type === 'MAC' ? 3 : 2;
            for (const [key, count] of Object.entries(counts)) {
                const limit = (key === 'V-Drill') ? 2 : maxDupes; 
                if (count > limit) {
                    errors.push(`Max ${limit} "${key}" allowed (Has ${count}).`);
                }
            }

            return errors;
        };

        const createDefaultModules = (typeId, factionId, isMerc) => {
            const typeData = UNIT_TYPES[typeId];
            if (!typeData || typeData.type === 'ASSET') return [];
            
            const startSlots = typeData.type === 'MAC' ? 6 : 1;
            const modules = [];

            if (factionId === 'FIRST' && typeData.type === 'MAC' && !isMerc) {
                modules.push({ category: 'HW', range: 'S', type: 'B', power: 1, subtype: '', hwName: 'Seeker', brawlId: 'P2', isSlot0: true, isDouble: false, customName: '' });
            }

            modules.push({ category: 'WEAPON', range: 'S', type: 'B', power: 1, subtype: '', hwName: 'Amplifier', brawlId: 'P2', isDouble: false, customName: '' });
            
            if (typeData.type === 'MAC') {
                modules[modules.length-1].power = typeData.maxMain;
                for (let i = 1; i < startSlots; i++) {
                    modules.push({ category: 'HW', range: 'S', type: 'B', power: 1, subtype: '', hwName: 'Frame', brawlId: 'P2', isDouble: false, customName: '' });
                }
            }
            return modules;
        };

        const sanitizeUnit = (unit) => {
            return {
                ...unit,
                isMerc: unit.isMerc || false,
                pilot: unit.pilot || { name: '', type: 'Standard', trick: '', isCommander: false, drill: '' },
                perks: unit.perks || '',
                flaws: unit.flaws || '',
                card: unit.card || { suit: '', rank: '' },
                count: unit.count || 1,
                assetName: unit.assetName || REMOTE_ASSETS[0].name
            };
        };

        // --- Components ---

        const ImageUpload = ({ image, onImageChange }) => {
            const fileInputRef = useRef(null);

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        onImageChange(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className="w-full h-full">
                    <input 
                        type="file" 
                        ref={fileInputRef}
                        onChange={handleFileChange} 
                        accept="image/*" 
                        className="hidden" 
                    />
                    <div 
                        className={`w-full h-full min-h-[100px] flex flex-col items-center justify-center border-2 border-dashed rounded cursor-pointer transition-colors ${image ? 'border-slate-300' : 'border-slate-300 hover:border-blue-400 bg-slate-50'}`}
                        onClick={() => fileInputRef.current.click()}
                        title="Click to upload image"
                    >
                        {image ? (
                            <img src={image} alt="Unit" className="w-full h-full object-cover rounded" />
                        ) : (
                            <div className="text-slate-400 flex flex-col items-center gap-1">
                                <IconCamera />
                                <span className="text-xs uppercase font-bold text-center leading-tight">Add<br/>Photo</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        };


        const ModuleEditor = ({ module, index, displayIndex, unitType, onChange, onDelete, onClone, onMoveUp, onMoveDown, isFirstMovable, isLastMovable, isMac, availableHardware, showDoubleOption }) => {
            const typeInfo = UNIT_TYPES[unitType];
            const isAu = typeInfo.type === 'AU';
            const ruleText = getModuleRule(module);
            const isSlot0 = module.isSlot0;

            return (
                <div className={`flex flex-col lg:flex-row gap-2 p-2 ${isSlot0 ? 'bg-amber-50 border-amber-200' : 'bg-slate-50 border-slate-200'} border rounded mb-2 items-start lg:items-center text-sm group transition-colors`}>
                    
                    <div className="flex flex-col gap-0 opacity-20 group-hover:opacity-100 transition-opacity mr-1 shrink-0">
                        <button onClick={onMoveUp} disabled={isFirstMovable || isSlot0} className="text-slate-500 hover:text-blue-600 disabled:opacity-30 disabled:hover:text-slate-500" title="Move Up">
                            <IconArrowUp />
                        </button>
                        <button onClick={onMoveDown} disabled={isLastMovable || isSlot0} className="text-slate-500 hover:text-blue-600 disabled:opacity-30 disabled:hover:text-slate-500" title="Move Down">
                            <IconArrowDown />
                        </button>
                    </div>

                    <div className={`font-black w-6 flex-shrink-0 text-center ${isSlot0 ? 'text-amber-600' : 'text-slate-400'}`}>
                        {isSlot0 ? 'O' : displayIndex}
                    </div>
                    
                    <select 
                        className="p-1 border rounded bg-white w-full lg:w-auto"
                        value={module.category}
                        disabled={isSlot0} 
                        onChange={(e) => onChange(index, { ...module, category: e.target.value, range: 'S', type: 'B', power: 1, subtype: '', hwName: availableHardware[0]?.name || 'Frame', brawlId: 'P2', customName: '' })}
                    >
                        {isSlot0 ? <option value="HW">Hardware</option> : (
                            <>
                                <option value="WEAPON">Gun</option>
                                <option value="BRAWL">Brawl</option>
                                <option value="HW">Hardware</option>
                                {isMac && <option value="EMPTY">Empty</option>}
                            </>
                        )}
                    </select>

                    <div className="flex-grow w-full lg:w-auto flex flex-col gap-1">
                        
                        {(module.category === 'WEAPON' || module.category === 'BRAWL') && (
                             <input 
                                type="text" 
                                className="p-1 border rounded w-full text-sm placeholder-slate-400 mb-1" 
                                placeholder="Weapon Name (Optional)"
                                value={module.customName || ''}
                                onChange={(e) => onChange(index, { ...module, customName: e.target.value })}
                             />
                        )}

                        {module.category === 'WEAPON' && (
                            <div className="flex flex-wrap gap-1">
                                <select className="p-1 border rounded flex-grow" value={module.range} onChange={e => onChange(index, { ...module, range: e.target.value })}>
                                    {WEAPON_RANGES.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                                </select>
                                <select className="p-1 border rounded flex-grow" value={module.type} onChange={e => onChange(index, { ...module, type: e.target.value })}>
                                    {WEAPON_TYPES.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                </select>
                                <select className="p-1 border rounded w-16" value={module.power} onChange={e => onChange(index, { ...module, power: parseInt(e.target.value) })}>
                                    {[1,2,3,4].map(p => <option key={p} value={p}>Pwr {p}</option>)}
                                </select>
                                <select className="p-1 border rounded flex-grow" value={module.subtype} onChange={e => onChange(index, { ...module, subtype: e.target.value })}>
                                    {WEAPON_SUBTYPES.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                </select>
                            </div>
                        )}

                        {module.category === 'BRAWL' && (
                            <div className="flex gap-1">
                                <select className="p-1 border rounded w-full" value={module.brawlId} onChange={e => onChange(index, { ...module, brawlId: e.target.value })}>
                                    {BRAWL_WEAPONS.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                                </select>
                                <select className="p-1 border rounded w-1/3" value={module.subtype || ''} onChange={e => onChange(index, { ...module, subtype: e.target.value })}>
                                    {WEAPON_SUBTYPES.map(s => <option key={s.id} value={s.id}>{s.name || 'No Type'}</option>)}
                                </select>
                            </div>
                        )}

                        {module.category === 'HW' && (
                            <select className="p-1 border rounded w-full" value={module.hwName} onChange={e => onChange(index, { ...module, hwName: e.target.value })}>
                                {availableHardware.map(h => <option key={h.name} value={h.name}>{h.name}</option>)}
                            </select>
                        )}
                        
                        {module.category === 'EMPTY' && <div className="text-slate-400 italic p-1">Empty Slot</div>}
                    </div>

                    <div className="w-full lg:w-48 shrink-0">
                        {ruleText && (
                            <div className="text-xs text-slate-500 bg-white p-1.5 rounded border border-slate-200 leading-tight h-full flex items-center">
                                {ruleText}
                            </div>
                        )}
                    </div>

                    <div className="flex items-center gap-2 min-w-[60px] justify-end ml-auto lg:ml-0 opacity-50 group-hover:opacity-100 transition-opacity">
                         {module.category === 'WEAPON' && <span className="font-mono font-bold text-blue-600 mr-2">{generateWeaponCode(module)}</span>}
                         
                         {showDoubleOption && !isSlot0 && module.category !== 'EMPTY' && (
                             <label className="flex items-center cursor-pointer mr-2" title="Double Module (+1pt)">
                                 <span className="text-xs font-bold mr-1 text-slate-500">2x</span>
                                 <input 
                                    type="checkbox" 
                                    checked={module.isDouble || false} 
                                    onChange={(e) => onChange(index, { ...module, isDouble: e.target.checked })} 
                                 />
                             </label>
                         )}

                         {!isSlot0 && (
                             <button onClick={() => onClone(index)} className="text-slate-400 hover:text-blue-600" title="Clone to next empty slot">
                                <IconClone />
                             </button>
                         )}

                        {isAu && (
                            <button onClick={() => onDelete(index)} className="text-red-400 hover:text-red-600" title="Delete Slot">
                                <IconTrash />
                            </button>
                        )}
                        {isSlot0 && <span className="text-amber-500 font-bold text-xs uppercase">O-MOD</span>}
                    </div>
                </div>
            );
        };

        const MACBuilder = () => {
            const [forceName, setForceName] = useState("New Force");
            const [factionId, setFactionId] = useState("NONE");
            const [units, setUnits] = useState([]);
            const [isPrintMode, setIsPrintMode] = useState(false);
            const [showHelp, setShowHelp] = useState(false);
            const [hitStates, setHitStates] = useState({});
            const [destroyedStates, setDestroyedStates] = useState({});
            const [depletedStates, setDepletedStates] = useState({});
            const [damageStates, setDamageStates] = useState({});
            
            // Feature Flags
            const [variantRules, setVariantRules] = useState({ 
                remoteAssets: false, 
                hiredMercs: false, 
                perksFlaws: false, 
                pilots: false,
                doubleModules: false 
            });

            const fileInputRef = useRef(null);
            const importUnitRef = useRef(null);

            useEffect(() => {
                if (units.length === 0) addUnit('MAC2');
            }, []);

            const toggleHit = (unitId, modIndex) => {
                setHitStates(prev => {
                    const unitHits = prev[unitId] || {};
                    const newHit = !unitHits[modIndex];
                    return { ...prev, [unitId]: { ...unitHits, [modIndex]: newHit } };
                });
            };

            const toggleDestroyed = (unitId, modIndex) => {
                setDestroyedStates(prev => {
                    const unitDestroyed = prev[unitId] || {};
                    const newDestroyed = !unitDestroyed[modIndex];
                    return { ...prev, [unitId]: { ...unitDestroyed, [modIndex]: newDestroyed } };
                });
            };

            const toggleDepleted = (unitId, modIndex, isDouble) => {
                setDepletedStates(prev => {
                    const unitDepleted = prev[unitId] || {};
                    const currentCount = unitDepleted[modIndex] || 0;
                    const maxCount = isDouble ? 2 : 1;
                    const newCount = (currentCount + 1) % (maxCount + 1);
                    return { ...prev, [unitId]: { ...unitDepleted, [modIndex]: newCount } };
                });
            };

            const toggleInternalDamage = (unitId, damageIndex) => {
                setDamageStates(prev => {
                    const unitDmg = prev[unitId] || {};
                    const newDmg = !unitDmg[damageIndex];
                    return { ...prev, [unitId]: { ...unitDmg, [damageIndex]: newDmg } };
                });
            };

            const getNextAvailableRank = (currentUnits) => {
                const usedRanks = currentUnits.map(u => u.card?.rank).filter(Boolean);
                return RANKS.find(r => !usedRanks.includes(r)) || '';
            };

            const getGlobalSuit = (currentUnits) => {
                return currentUnits.find(u => u.card?.suit)?.card?.suit || '';
            };

            const addUnit = (typeId = 'MAC2') => {
                setUnits(prevUnits => {
                    const nextRank = getNextAvailableRank(prevUnits);
                    const globalSuit = getGlobalSuit(prevUnits);
                    const countStr = prevUnits.length + 1;
                    const nameBase = typeId === 'REMOTE' ? 'Asset' : 'Unit';

                    const newUnit = {
                        id: Date.now() + Math.random(),
                        name: `${nameBase} ${countStr}`,
                        type: typeId,
                        assetName: REMOTE_ASSETS[0].name,
                        image: null,
                        isMerc: false,
                        pilot: { name: '', type: 'Standard', trick: '', isCommander: false, drill: '' },
                        perks: '',
                        flaws: '',
                        card: { suit: globalSuit, rank: nextRank },
                        modules: createDefaultModules(typeId, factionId, false),
                        count: 1
                    };
                    return [...prevUnits, newUnit];
                });
            };

            const updateUnit = (id, field, value, nestedField) => {
                setUnits(prevUnits => {
                    // Sync card suits across all units
                    if (field === 'card' && nestedField === 'suit') {
                        return prevUnits.map(u => ({
                            ...u,
                            card: { ...u.card, suit: value }
                        }));
                    }

                    if (field === 'pilot' && nestedField === 'isCommander' && value === true) {
                        return prevUnits.map(u => {
                            if (u.id === id) return { ...u, pilot: { ...u.pilot, isCommander: true } };
                            return { ...u, pilot: { ...u.pilot, isCommander: false } };
                        });
                    }

                    return prevUnits.map(u => {
                        if (u.id !== id) return u;
                        
                        if (field === 'type') {
                            const defaultAsset = u.assetName || REMOTE_ASSETS[0].name;
                            return sanitizeUnit({ 
                                ...u, 
                                type: value, 
                                assetName: defaultAsset,
                                modules: createDefaultModules(value, factionId, u.isMerc),
                                count: 1 
                            });
                        }
                        
                        if (field === 'pilot') return { ...u, pilot: { ...u.pilot, [nestedField]: value } };
                        if (field === 'card') return { ...u, card: { ...u.card, [nestedField]: value } };
                        
                        if (field === 'isMerc') {
                            const isNowMerc = value;
                            let newModules = u.modules ? [...u.modules] : [];
                            
                            if (isNowMerc) {
                                newModules = newModules.filter(m => !m.isSlot0);
                            } else if (factionId === 'FIRST' && UNIT_TYPES[u.type].type === 'MAC') {
                                if (!newModules.some(m => m.isSlot0)) {
                                    newModules.unshift({ category: 'HW', range: 'S', type: 'B', power: 1, subtype: '', hwName: 'Seeker', brawlId: 'P2', isSlot0: true, customName: '' });
                                }
                            }
                            return { ...u, isMerc: isNowMerc, modules: newModules };
                        }

                        return { ...u, [field]: value };
                    });
                });
            };

            const updateModule = (unitId, modIndex, newModule) => {
                setUnits(units.map(u => {
                    if (u.id !== unitId) return u;
                    const newModules = [...u.modules];
                    newModules[modIndex] = newModule;
                    return { ...u, modules: newModules };
                }));
            };

            const cloneModule = (unitId, sourceIndex) => {
                setUnits(units.map(u => {
                    if (u.id !== unitId) return u;
                    const sourceMod = u.modules[sourceIndex];
                    if (sourceMod.isSlot0) return u;

                    const newModules = [...u.modules];
                    if (UNIT_TYPES[u.type].type === 'AU') {
                        return { ...u, modules: [...u.modules, { ...sourceMod }] };
                    }
                    for (let i = 0; i < newModules.length; i++) {
                         if (i !== sourceIndex && !newModules[i].isSlot0 && (newModules[i].category === 'EMPTY' || newModules[i].hwName === 'Frame')) {
                             newModules[i] = { ...sourceMod, isSlot0: false };
                             break;
                         }
                    }
                    return { ...u, modules: newModules };
                }));
            }

            const moveModule = (unitId, index, direction) => {
                setUnits(units.map(u => {
                    if (u.id !== unitId) return u;
                    const newModules = [...u.modules];
                    if (direction === -1 && index > 0) {
                        if (newModules[index - 1].isSlot0) return u;
                        [newModules[index - 1], newModules[index]] = [newModules[index], newModules[index - 1]];
                    } else if (direction === 1 && index < newModules.length - 1) {
                        [newModules[index + 1], newModules[index]] = [newModules[index], newModules[index + 1]];
                    }
                    return { ...u, modules: newModules };
                }));
            };

            const addModuleSlot = (unitId) => {
                setUnits(units.map(u => {
                    if (u.id !== unitId) return u;
                    return { ...u, modules: [...u.modules, { category: 'HW', range: 'S', type: 'B', power: 1, subtype: '', hwName: 'Armour', brawlId: 'P2', isDouble: false, customName: '' }] };
                }));
            };

            const removeModuleSlot = (unitId, index) => {
                setUnits(units.map(u => {
                    if (u.id !== unitId) return u;
                    const newModules = u.modules.filter((_, i) => i !== index);
                    return { ...u, modules: newModules };
                }));
            };

            const removeUnit = (id) => {
                setUnits(units.filter(u => u.id !== id));
            };

            const duplicateUnit = (unit) => {
                setUnits(prevUnits => {
                    const nextRank = getNextAvailableRank(prevUnits);
                    const globalSuit = getGlobalSuit(prevUnits);
                    
                    const newUnit = sanitizeUnit({ 
                        ...unit, 
                        id: Date.now() + Math.random(), 
                        name: `${unit.name} (Copy)`, 
                        pilot: {...unit.pilot, isCommander: false}, 
                        card: { suit: globalSuit, rank: nextRank },
                        modules: unit.modules ? JSON.parse(JSON.stringify(unit.modules)) : []
                    });
                    return [...prevUnits, newUnit];
                });
            };

            const moveUnit = (index, direction) => {
                if (direction === -1 && index > 0) {
                    const newUnits = [...units];
                    [newUnits[index - 1], newUnits[index]] = [newUnits[index], newUnits[index - 1]];
                    setUnits(newUnits);
                } else if (direction === 1 && index < units.length - 1) {
                    const newUnits = [...units];
                    [newUnits[index + 1], newUnits[index]] = [newUnits[index], newUnits[index + 1]];
                    setUnits(newUnits);
                }
            };

            const handleFactionChange = (e) => {
                const newFaction = e.target.value;
                setFactionId(newFaction);

                setUnits(prevUnits => prevUnits.map(u => {
                    const typeInfo = UNIT_TYPES[u.type];
                    if (!typeInfo || typeInfo.type !== 'MAC') return u; 
                    if (u.isMerc) return u;

                    let newModules = [...u.modules];
                    if (newFaction === 'FIRST') {
                        if (!newModules.some(m => m.isSlot0)) {
                            newModules.unshift({ 
                                category: 'HW', range: 'S', type: 'B', power: 1, subtype: '', 
                                hwName: 'Seeker', brawlId: 'P2', isSlot0: true, isDouble: false, customName: '' 
                            });
                        }
                    } else {
                        newModules = newModules.filter(m => !m.isSlot0);
                    }
                    return { ...u, modules: newModules };
                }));
            };

            const toggleVariantRule = (ruleKey) => {
                setVariantRules(prev => ({ ...prev, [ruleKey]: !prev[ruleKey] }));
            }

            const handleSave = () => {
                const data = JSON.stringify({ forceName, factionId, units, variantRules }, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `${forceName.replace(/[^a-z0-9]/gi, '_').toLowerCase() || 'force'}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const handleLoad = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.forceName) setForceName(data.forceName);
                        if (data.factionId) setFactionId(data.factionId); 
                        
                        let loadedUnits = [];
                        if (data.units) loadedUnits = data.units.map(sanitizeUnit);

                        // Backwards compatibility for old JSON saves using 'myAssets'
                        if (data.myAssets && data.myAssets.length > 0) {
                            data.myAssets.forEach((assetName, idx) => {
                                loadedUnits.push(sanitizeUnit({
                                    id: Date.now() + Math.random() + idx,
                                    name: assetName,
                                    type: 'REMOTE',
                                    assetName: assetName,
                                    modules: [],
                                    count: 1
                                }));
                            });
                        }
                        setUnits(loadedUnits);

                        if (data.variantRules) setVariantRules(data.variantRules);
                        else {
                            setVariantRules(prev => ({
                                ...prev,
                                remoteAssets: data.showRemoteAssets || (data.myAssets && data.myAssets.length > 0) || false,
                                doubleModules: data.showDoubleModules || false
                            }));
                        }
                    } catch (err) {
                        alert("Invalid file format or corrupt file.");
                    }
                };
                reader.readAsText(file);
                event.target.value = null;
            };

            const exportUnit = (unit) => {
                const dataToExport = {
                    macAttackExportType: 'UNIT',
                    unitData: unit
                };
                const data = JSON.stringify(dataToExport, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                const safeName = (unit.name || 'unit').replace(/[^a-z0-9]/gi, '_').toLowerCase();
                link.download = `${safeName}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const handleImportUnit = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        let importedUnit = null;
                        
                        if (data.macAttackExportType === 'UNIT' && data.unitData) {
                            importedUnit = data.unitData;
                        } else if (data.type && UNIT_TYPES[data.type]) {
                            // Fallback if uploading a raw unit JSON block
                            importedUnit = data;
                        }

                        if (importedUnit) {
                            setUnits(prevUnits => {
                                const nextRank = getNextAvailableRank(prevUnits);
                                const globalSuit = getGlobalSuit(prevUnits);
                                
                                const newUnit = sanitizeUnit({ 
                                    ...importedUnit, 
                                    id: Date.now() + Math.random(), 
                                    card: { suit: globalSuit, rank: nextRank }
                                });
                                return [...prevUnits, newUnit];
                            });
                        } else {
                            alert("Invalid unit file format. Please upload a file exported using the Unit Export button.");
                        }
                    } catch (err) {
                        alert("Invalid file format or corrupt file.");
                    }
                };
                reader.readAsText(file);
                event.target.value = null;
            };

            const copyToClipboard = () => {
                let text = `**${forceName}** (${factionId !== 'NONE' ? FACTIONS.find(f=>f.id===factionId).name : 'No Faction'})\n`;
                text += `Total Points: ${totalCost}\n\n`;
                units.forEach(u => {
                    const count = u.count || 1;
                    const typeInfo = UNIT_TYPES[u.type];
                    text += `**${count > 1 ? count + 'x ' : ''}${u.name}**`;
                    if (u.card && u.card.rank && u.card.suit) {
                        const suit = SUITS.find(s => s.name === u.card.suit);
                        text += ` [${u.card.rank} of ${suit.symbol}]`;
                    }
                    text += ` - ${typeInfo.name} (${calculateCost(u)}pts)\n`;
                    
                    if (typeInfo.type === 'ASSET') {
                         text += `   Asset: ${u.assetName}\n\n`;
                         return;
                    }

                    if (variantRules.pilots && u.pilot?.name) text += `Pilot: ${u.pilot.name} (${u.pilot.type})\n`;
                    let counter = 1;
                    u.modules.forEach((m, i) => {
                        let desc = '';
                        if (m.category === 'WEAPON') desc = `${generateWeaponCode(m)}`;
                        else if (m.category === 'BRAWL') desc = `Brawl: ${m.brawlId}`;
                        else if (m.category === 'HW') desc = `HW: ${m.hwName}`;
                        else desc = '[Empty]';
                        
                        if(m.isDouble) desc = `2x ${desc}`;
                        if (m.customName) desc = `${m.customName} (${desc})`;

                        let prefix = m.isSlot0 ? 'O' : `${counter++}`;
                        text += `   ${prefix}. ${desc}\n`;
                    });
                    text += '\n';
                });
                navigator.clipboard.writeText(text).then(() => alert("List copied to clipboard!"));
            };

            const totalCost = units.reduce((sum, u) => sum + calculateCost(u), 0);
            const selectedFaction = FACTIONS.find(f => f.id === factionId) || FACTIONS[0];
            
            // Force Level Validation
            const totalMacs = units.filter(u => UNIT_TYPES[u.type]?.type === 'MAC').length;
            const totalAus = units.filter(u => UNIT_TYPES[u.type]?.type === 'AU').length;
            const totalAssets = units.filter(u => UNIT_TYPES[u.type]?.type === 'ASSET').reduce((sum, u) => sum + (u.count || 1), 0);
            
            const forceErrors = [];
            if (totalMacs > 0 && totalMacs < 3) forceErrors.push("A legal force requires at least 3 MACs.");
            if (totalAus > totalMacs) forceErrors.push(`Too many auxiliary formations. Max 1 AU formation per MAC (MACs: ${totalMacs}, AU Formations: ${totalAus}).`);
            if (variantRules.remoteAssets && totalAssets > totalMacs) {
                forceErrors.push(`Too many Remote Assets. Limit 1 per MAC (MACs: ${totalMacs}, Assets: ${totalAssets}).`);
            }


            if (isPrintMode) {
                return (
                    <div className="bg-white min-h-screen p-8 font-sans text-black">
                        <div className="flex justify-between items-end border-b-2 border-black pb-4 mb-6 no-print">
                            <div>
                                <h1 className="text-4xl font-black tracking-tighter uppercase">{forceName}</h1>
                            </div>
                            <div className="text-right">
                                <div className="text-3xl font-bold">{totalCost} <span className="text-sm font-normal text-gray-500">PTS</span></div>
                                <div className="flex gap-3 mt-2 justify-end items-center">
                                    <button onClick={() => window.print()} className={BTN_TOOL_CLASS}>
                                        <IconPrinter /> Print
                                    </button>
                                    <button onClick={() => setIsPrintMode(false)} className="text-sm underline text-slate-500 hover:text-blue-600 cursor-pointer">Back to Edit</button>
                                </div>
                            </div>
                        </div>
                        <div className="hidden print-only mb-6 border-b-4 border-black pb-2">
                             <div className="flex justify-between items-end">
                                <div><h1 className="text-4xl font-black uppercase tracking-tighter">{forceName}</h1></div>
                                <div className="text-2xl font-black">{totalCost} PTS</div>
                             </div>
                        </div>

                        {selectedFaction.id !== 'NONE' && (
                            <div className="mb-6 border-2 border-black p-3 bg-gray-100 break-inside-avoid">
                                <h3 className="font-black uppercase text-lg">{selectedFaction.name}</h3>
                                <p className="font-bold text-sm">{selectedFaction.ruleName}: <span className="font-normal">{selectedFaction.rule}</span></p>
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 items-start">
                            {units.map((u, idx) => {
                                const cost = calculateCost(u);
                                const typeInfo = UNIT_TYPES[u.type];
                                const isMac = typeInfo.type === 'MAC';
                                const isAsset = typeInfo.type === 'ASSET';
                                let slotCounter = 1;
                                const count = u.count || 1;
                                
                                const cardSuit = u.card?.suit ? SUITS.find(s => s.name === u.card.suit) : null;
                                const cardColor = cardSuit?.color === 'text-red-600' ? 'text-red-600' : 'text-black';

                                return (
                                    <div key={u.id} className="border-2 border-black break-inside-avoid flex flex-col relative">
                                        <div className="bg-black text-white p-2 px-3 flex justify-between items-center shrink-0">
                                            <div className="flex flex-col">
                                                <span className="font-black uppercase text-lg tracking-tight leading-none">
                                                    {count > 1 && <span className="text-amber-300 mr-2">{count}x</span>}
                                                    {u.name}
                                                </span>
                                                {u.card?.rank && cardSuit && (
                                                    <span className={`text-sm font-bold uppercase mt-1 px-2 py-0.5 bg-white rounded w-fit border-2 border-gray-400 ${cardColor}`}>
                                                        {u.card.rank} {cardSuit.symbol}
                                                    </span>
                                                )}
                                            </div>
                                            <div className="flex gap-4 text-sm items-center">
                                                {u.isMerc && variantRules.hiredMercs && (
                                                     <span className="font-bold text-xs bg-white text-black px-2 py-0.5 rounded">Hired MAC</span>
                                                )}
                                                <span className="font-medium opacity-80">{typeInfo.name}</span>
                                                <span className="font-black text-lg">{cost} pts</span>
                                            </div>
                                        </div>
                                        
                                        {!isAsset && (variantRules.pilots || variantRules.perksFlaws) && (
                                            <div className="bg-white p-2 text-xs border-b border-black flex flex-col gap-1">
                                                {variantRules.perksFlaws && (u.perks || u.flaws) && (
                                                    <div className="leading-tight">
                                                        {u.perks && <span className="mr-3"><span className="font-bold">Perks: {u.perks}</span> <span className="italic text-gray-600">{PERKS.find(p => p.name === u.perks)?.rule}</span></span>}
                                                        {u.flaws && <span><span className="font-bold">Flaws: {u.flaws}</span> <span className="italic text-gray-600">{FLAWS.find(f => f.name === u.flaws)?.rule}</span></span>}
                                                    </div>
                                                )}
                                                {variantRules.pilots && (
                                                    <div className="leading-tight flex flex-wrap gap-3 border-t border-gray-300 pt-1 mt-1">
                                                        {u.pilot?.name && <span><span className="font-bold">Pilot:</span> {u.pilot.name} ({u.pilot.type})</span>}
                                                        {u.pilot?.isCommander && <span className="font-bold uppercase bg-black text-white px-1 text-[10px]">COMMANDER</span>}
                                                        {u.pilot?.trick && <span><span className="font-bold">Trick: {u.pilot.trick}</span> <span className="italic text-gray-600">- {PILOT_TRICKS.find(t => t.name === u.pilot.trick)?.rule}</span></span>}
                                                        {u.pilot?.isCommander && u.pilot?.drill && <span><span className="font-bold">Drill: {u.pilot.drill}</span> <span className="italic text-gray-600">- {COMMAND_DRILLS.find(d => d.name === u.pilot.drill)?.rule}</span></span>}
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {!isAsset && typeInfo.intDmg > 0 && (
                                            <div className="bg-gray-100 p-2 border-b border-black flex items-center gap-2 justify-center">
                                                <span className="text-xs font-bold uppercase">Internal Damage:</span>
                                                {Array.from({length: typeInfo.intDmg}).map((_, di) => {
                                                    const isMarked = damageStates[u.id]?.[di];
                                                    return <div key={di} className={`w-6 h-6 border-2 border-black ${isMarked ? 'bg-black' : 'bg-white'} cursor-pointer`} onClick={() => toggleInternalDamage(u.id, di)}></div>;
                                                })}
                                            </div>
                                        )}

                                        <div className="flex">
                                            {isAsset ? (
                                                <div className="p-4 bg-gray-50 grow">
                                                    <div className="font-black text-lg mb-1">{u.assetName}</div>
                                                    <div className="text-sm italic text-gray-700">{REMOTE_ASSETS.find(a => a.name === u.assetName)?.rule}</div>
                                                </div>
                                            ) : (
                                                <>
                                                    <div className="grow">
                                                        <table className="w-full text-sm border-collapse">
                                                            <thead>
                                                                <tr className="border-b-2 border-black text-left">
                                                                    <th className="p-2 w-8 text-center font-bold">#</th>
                                                                    <th className="p-2 font-bold">Module</th>
                                                                    <th className="p-2 font-bold">Notes</th>
                                                                    {isMac && <th className="p-2 w-10 text-center font-bold">Hit</th>}
                                                                    {isMac && <th className="p-2 w-10 text-center font-bold">Dst</th>}
                                                                    <th className="p-2 w-10 text-center font-bold">Dep</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {u.modules.map((mod, i) => {
                                                                    let code = "";
                                                                    let notes = getModuleRule(mod);
                                                                    
                                                                    if (mod.category === 'WEAPON') code = generateWeaponCode(mod);
                                                                    else if (mod.category === 'BRAWL') {
                                                                        code = mod.brawlId;
                                                                        const subtype = WEAPON_SUBTYPES.find(s => s.id === mod.subtype);
                                                                        if (subtype && subtype.code) code += subtype.code;
                                                                    } else if (mod.category === 'HW') code = mod.hwName;
                                                                    else { code = ""; notes = ""; }
                                                                    
                                                                    if (mod.isDouble) code = `2x ${code}`;
                                                                    const isHit = hitStates[u.id]?.[i];
                                                                    const isDestroyed = destroyedStates[u.id]?.[i];
                                                                    const isExpendable = mod.category === 'WEAPON' && mod.subtype === 'X';
                                                                    const depletedCount = depletedStates[u.id]?.[i] || 0;
                                                                    let displayNum = mod.isSlot0 ? 'O' : slotCounter++;

                                                                    let label = mod.customName ? (
                                                                        <div>
                                                                            <span className="block font-bold">{mod.customName}</span>
                                                                            <span className="text-xs text-slate-500 font-mono">{code}</span>
                                                                        </div>
                                                                    ) : <span className="font-bold">{code}</span>;

                                                                    return (
                                                                        <tr key={i} className={`border-b border-gray-300 last:border-0 h-10 ${mod.isSlot0 ? 'bg-gray-100' : ''}`}>
                                                                            <td className="p-2 text-center font-bold text-gray-400 border-r border-gray-200">{displayNum}</td>
                                                                            <td className="p-2 font-bold border-r border-gray-200">{label}</td>
                                                                            <td className="p-2 text-gray-600 text-xs leading-tight border-r border-gray-200">{notes}</td>
                                                                            {isMac && (
                                                                                <td className="p-2 text-center align-middle cursor-pointer hover:bg-gray-50" onClick={() => toggleHit(u.id, i)}>
                                                                                    <div className={`w-4 h-4 border-2 border-gray-400 rounded-full mx-auto ${isHit ? 'bg-black border-black' : 'bg-white'}`}></div>
                                                                                </td>
                                                                            )}
                                                                            {isMac && (
                                                                                <td className="p-2 text-center align-middle cursor-pointer hover:bg-gray-50" onClick={() => toggleDestroyed(u.id, i)}>
                                                                                    <div className={`w-4 h-4 border-2 border-gray-400 rounded-sm mx-auto ${isDestroyed ? 'bg-red-600 border-red-600' : 'bg-white'}`}></div>
                                                                                </td>
                                                                            )}
                                                                            <td className="p-2 text-center align-middle cursor-pointer hover:bg-gray-50" onClick={() => isExpendable && toggleDepleted(u.id, i, mod.isDouble)}>
                                                                                {isExpendable && (
                                                                                    <div className="flex gap-1 justify-center">
                                                                                        <div className={`w-3 h-3 border-2 border-amber-500 rounded-sm ${depletedCount >= 1 ? 'bg-amber-500' : 'bg-white'}`}></div>
                                                                                        {mod.isDouble && <div className={`w-3 h-3 border-2 border-amber-500 rounded-sm ${depletedCount >= 2 ? 'bg-amber-500' : 'bg-white'}`}></div>}
                                                                                    </div>
                                                                                )}
                                                                            </td>
                                                                        </tr>
                                                                    );
                                                                })}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                    <div className="w-32 border-l-2 border-black flex flex-col shrink-0 bg-gray-50">
                                                        <div className="grow relative flex items-center justify-center overflow-hidden min-h-[240px]">
                                                            {u.image ? (
                                                                <img src={u.image} className="absolute inset-0 w-full h-full object-cover" />
                                                            ) : (
                                                                <span className="text-gray-300 text-xs font-bold uppercase -rotate-45">Portrait</span>
                                                            )}
                                                        </div>
                                                    </div>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            }

            return (
                <div className="bg-slate-100 min-h-screen p-4 sm:p-6">
                    <div className="max-w-5xl mx-auto bg-white p-4 rounded-lg shadow-sm border border-slate-200 sticky top-4 z-20 mb-8">
                        <div className="flex flex-wrap gap-4 mb-4 p-3 bg-slate-100 border border-slate-200 rounded text-xs font-bold text-slate-600 uppercase tracking-wider">
                            <span className="text-slate-400 mr-2 self-center">Options:</span>
                            <label className="flex items-center gap-2 cursor-pointer hover:text-blue-600 transition-colors">
                                <input type="checkbox" className="accent-blue-600 w-4 h-4" checked={variantRules.remoteAssets} onChange={() => toggleVariantRule('remoteAssets')} /> 
                                Remote Assets
                            </label>
                            <label className="flex items-center gap-2 cursor-pointer hover:text-blue-600 transition-colors">
                                <input type="checkbox" className="accent-blue-600 w-4 h-4" checked={variantRules.hiredMercs} onChange={() => toggleVariantRule('hiredMercs')} /> 
                                Hired MACs
                            </label>
                            <label className="flex items-center gap-2 cursor-pointer hover:text-blue-600 transition-colors">
                                <input type="checkbox" className="accent-blue-600 w-4 h-4" checked={variantRules.pilots} onChange={() => toggleVariantRule('pilots')} /> 
                                Pilots & Cmdrs
                            </label>
                            <label className="flex items-center gap-2 cursor-pointer hover:text-blue-600 transition-colors">
                                <input type="checkbox" className="accent-blue-600 w-4 h-4" checked={variantRules.perksFlaws} onChange={() => toggleVariantRule('perksFlaws')} /> 
                                Perks & Flaws
                            </label>
                            <label className="flex items-center gap-2 cursor-pointer hover:text-blue-600 transition-colors">
                                <input type="checkbox" className="accent-blue-600 w-4 h-4" checked={variantRules.doubleModules} onChange={() => toggleVariantRule('doubleModules')} /> 
                                Double Modules
                            </label>
                        </div>

                        <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                            <div className="w-full lg:w-auto flex-grow">
                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Force Name</label>
                                <input type="text" value={forceName} onChange={(e) => setForceName(e.target.value)} className="text-2xl font-black w-full bg-transparent border-b border-transparent hover:border-slate-300 focus:border-blue-500 outline-none transition-colors" />
                            </div>
                            <div className="w-full lg:w-64">
                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Faction</label>
                                <select className="w-full p-2 border rounded bg-slate-50 font-bold text-slate-700" value={factionId} onChange={handleFactionChange}>
                                    {FACTIONS.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                                </select>
                            </div>
                            <div className="flex items-center gap-2 shrink-0 self-end lg:self-center">
                                <div className="text-right mr-2">
                                    <div className="text-xs text-slate-400 font-bold uppercase">Total</div>
                                    <div className="text-3xl font-black text-blue-600">{totalCost}<span className="text-sm text-slate-400 ml-1">PTS</span></div>
                                </div>
                                <button onClick={copyToClipboard} className={BTN_TOOL_CLASS} title="Copy Text"><IconClipboard /></button>
                                <button onClick={handleSave} className={BTN_TOOL_CLASS} title="Save Force"><IconSave /></button>
                                <input type="file" ref={fileInputRef} onChange={handleLoad} accept=".json" className="hidden" />
                                <button onClick={() => fileInputRef.current.click()} className={BTN_TOOL_CLASS} title="Load Force"><IconLoad /></button>
                                <button onClick={() => setIsPrintMode(true)} className={BTN_TOOL_CLASS} title="Print"><IconPrinter /></button>
                                <button onClick={() => setShowHelp(true)} className={BTN_TOOL_CLASS} title="About / Help"><IconHelp /></button>
                            </div>
                        </div>
                        {selectedFaction.id !== 'NONE' && (
                            <div className="mt-4 p-3 bg-blue-50 border border-blue-100 rounded text-sm text-blue-800 flex gap-2 items-start">
                                <span className="font-black uppercase shrink-0">{selectedFaction.ruleName}:</span>
                                <span>{selectedFaction.rule}</span>
                            </div>
                        )}
                    </div>

                    {forceErrors.length > 0 && (
                        <div className="max-w-5xl mx-auto mb-6 bg-red-50 text-red-700 p-4 rounded-lg border border-red-200 shadow-sm flex items-start gap-3">
                            <IconInfo />
                            <div>
                                <h4 className="font-bold text-sm uppercase tracking-wide mb-1">Force Building Warnings</h4>
                                <ul className="list-disc list-inside text-sm">
                                    {forceErrors.map((err, i) => <li key={i}>{err}</li>)}
                                </ul>
                            </div>
                        </div>
                    )}

                    <div className="max-w-5xl mx-auto grid gap-6">
                        {units.map((unit, unitIndex) => {
                            const typeInfo = UNIT_TYPES[unit.type];
                            if (!typeInfo) return null;
                            const cost = calculateCost(unit);
                            const errors = checkValidation(unit);
                            
                            const isMac = typeInfo.type === 'MAC';
                            const isInf = typeInfo.id === 'INF';
                            const isAsset = typeInfo.type === 'ASSET';
                            
                            let availableHW = [];
                            if (!isAsset) {
                                availableHW = HARDWARE.filter(h => {
                                    const matchesType = (isMac ? h.type.includes('M') : (isInf ? h.type.includes('I') : h.type.includes('V'))) || h.type.includes('A');
                                    const isFactionUnique = FACTIONS.some(f => f.module === h.name);
                                    if (isFactionUnique) return !unit.isMerc && selectedFaction.module === h.name;
                                    return matchesType;
                                });
                            }

                            let slotCounter = 1;
                            const currentSuit = SUITS.find(s => s.name === unit.card?.suit);
                            const cardColorClass = currentSuit?.color || 'text-slate-400';
                            const maxFormation = getFormationLimit(unit.type);

                            return (
                                <div key={unit.id} className={`bg-white rounded-lg shadow-sm border ${unit.isMerc && variantRules.hiredMercs ? 'border-amber-300 ring-1 ring-amber-300' : 'border-slate-200'} overflow-hidden relative`}>
                                    {unit.isMerc && variantRules.hiredMercs && (
                                        <div className="absolute top-0 right-0 bg-amber-300 text-amber-900 text-xs font-black px-3 py-1 z-10 rounded-bl-lg uppercase tracking-wider">Hired MAC</div>
                                    )}

                                    <div className="bg-slate-50 p-4 border-b border-slate-100 flex flex-col sm:flex-row gap-4 justify-between items-start sm:items-center">
                                        <div className="flex-grow w-full sm:w-auto flex gap-4 items-center">
                                            {!isAsset && (
                                                <div className="w-16 h-16 shrink-0">
                                                    <ImageUpload image={unit.image} onImageChange={(newImage) => updateUnit(unit.id, 'image', newImage)} />
                                                </div>
                                            )}
                                            <div className="w-full">
                                                <div className="flex justify-between items-start">
                                                    <input 
                                                        type="text" 
                                                        value={unit.name} 
                                                        onChange={(e) => updateUnit(unit.id, 'name', e.target.value)}
                                                        className="font-bold text-lg bg-transparent w-full outline-none text-slate-700 placeholder-slate-300"
                                                        placeholder="Unit Name"
                                                    />
                                                    
                                                    <div className="flex gap-1 items-center bg-white border border-slate-200 rounded p-1 ml-2 shadow-sm shrink-0">
                                                        <IconCards size={16} className="text-slate-400 ml-1"/>
                                                        <select className={`p-1 text-sm font-bold bg-transparent outline-none ${cardColorClass}`} value={unit.card?.suit || ''} onChange={(e) => updateUnit(unit.id, 'card', e.target.value, 'suit')} title="Playing Card Suit">
                                                            <option value="" className="text-slate-400">Suit</option>
                                                            {SUITS.map(s => <option key={s.name} value={s.name} className={s.color}>{s.symbol}</option>)}
                                                        </select>
                                                        <select className={`p-1 text-sm font-bold bg-transparent outline-none w-12 text-center ${cardColorClass}`} value={unit.card?.rank || ''} onChange={(e) => updateUnit(unit.id, 'card', e.target.value, 'rank')} title="Playing Card Rank">
                                                            <option value="" className="text-slate-400">-</option>
                                                            {RANKS.map(r => <option key={r} value={r}>{r}</option>)}
                                                        </select>
                                                    </div>
                                                </div>

                                                <div className="flex flex-wrap gap-2 mt-2 items-center">
                                                    {maxFormation > 1 && (
                                                        <select className="p-1 border rounded bg-white text-sm font-bold w-16 text-center" value={unit.count || 1} onChange={(e) => updateUnit(unit.id, 'count', parseInt(e.target.value))} title="Stack Size">
                                                            {[...Array(maxFormation).keys()].map(n => <option key={n+1} value={n+1}>{n+1}x</option>)}
                                                        </select>
                                                    )}
                                                    <select className="p-1 border rounded bg-white text-sm font-medium" value={unit.type} onChange={(e) => updateUnit(unit.id, 'type', e.target.value)}>
                                                        {Object.values(UNIT_TYPES).map(t => {
                                                            if (t.id === 'REMOTE' && !variantRules.remoteAssets) return null;
                                                            return <option key={t.id} value={t.id}>{t.name}</option>
                                                        })}
                                                    </select>
                                                    <div className="bg-blue-100 text-blue-800 px-2 py-1 rounded font-bold text-xs flex items-center">{cost}pt</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {!isAsset && (variantRules.pilots || variantRules.perksFlaws || variantRules.hiredMercs) && (
                                        <div className="bg-gray-50 px-4 py-3 border-b border-slate-100 flex flex-wrap gap-4 text-sm items-center">
                                            {variantRules.hiredMercs && (
                                                <label className="flex items-center gap-2 cursor-pointer bg-white p-1.5 rounded border border-slate-200 hover:border-amber-400">
                                                    <input type="checkbox" checked={unit.isMerc || false} onChange={(e) => updateUnit(unit.id, 'isMerc', e.target.checked)} />
                                                    <span className="font-medium text-slate-600">Hired MAC</span>
                                                </label>
                                            )}
                                            {variantRules.pilots && (
                                                <>
                                                    <input type="text" placeholder="Pilot Name" className="p-1.5 border rounded w-32" value={unit.pilot?.name || ''} onChange={(e) => updateUnit(unit.id, 'pilot', e.target.value, 'name')} />
                                                    <select className="p-1.5 border rounded" value={unit.pilot?.type || 'Standard'} onChange={(e) => updateUnit(unit.id, 'pilot', e.target.value, 'type')}>
                                                        <option value="Standard">Standard</option>
                                                        <option value="Rookie">Rookie</option>
                                                        <option value="Notable">Notable</option>
                                                    </select>
                                                    {unit.pilot?.type === 'Notable' && (
                                                        <select className="p-1.5 border rounded w-32" value={unit.pilot?.trick || ''} onChange={(e) => updateUnit(unit.id, 'pilot', e.target.value, 'trick')}>
                                                            <option value="">No Trick</option>
                                                            {PILOT_TRICKS.map(t => <option key={t.name} value={t.name}>{t.name}</option>)}
                                                        </select>
                                                    )}
                                                    <label className="flex items-center gap-2 cursor-pointer">
                                                        <input type="checkbox" checked={unit.pilot?.isCommander || false} onChange={(e) => updateUnit(unit.id, 'pilot', e.target.checked, 'isCommander')} />
                                                        <span className="font-bold text-slate-600">Cmdr</span>
                                                    </label>
                                                    {unit.pilot?.isCommander && (
                                                        <select className="p-1.5 border rounded w-32" value={unit.pilot?.drill || ''} onChange={(e) => updateUnit(unit.id, 'pilot', e.target.value, 'drill')}>
                                                            <option value="">No Drill</option>
                                                            {COMMAND_DRILLS.map(d => <option key={d.name} value={d.name}>{d.name}</option>)}
                                                        </select>
                                                    )}
                                                </>
                                            )}
                                            {variantRules.perksFlaws && (
                                                <>
                                                    <select className="p-1.5 border rounded w-32" value={unit.perks || ''} onChange={(e) => updateUnit(unit.id, 'perks', e.target.value)}>
                                                        <option value="">No Perk</option>
                                                        {PERKS.map(p => <option key={p.name} value={p.name}>{p.name}</option>)}
                                                    </select>
                                                    <select className="p-1.5 border rounded w-32" value={unit.flaws || ''} onChange={(e) => updateUnit(unit.id, 'flaws', e.target.value)}>
                                                        <option value="">No Flaw</option>
                                                        {FLAWS.map(f => <option key={f.name} value={f.name}>{f.name}</option>)}
                                                    </select>
                                                </>
                                            )}
                                        </div>
                                    )}

                                    {errors.length > 0 && (
                                        <div className="bg-red-50 text-red-600 p-3 text-sm flex items-center gap-2 border-b border-red-100">
                                            <IconAlert />
                                            <div className="flex flex-col">{errors.map((e, i) => <span key={i}>{e}</span>)}</div>
                                        </div>
                                    )}

                                    {isAsset ? (
                                        <div className="p-6 bg-white">
                                            <label className="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Select Remote Asset</label>
                                            <select 
                                                className="w-full p-2 border border-slate-300 rounded font-bold text-slate-700 bg-slate-50 mb-3"
                                                value={unit.assetName}
                                                onChange={e => updateUnit(unit.id, 'assetName', e.target.value)}
                                            >
                                                {REMOTE_ASSETS.map(a => <option key={a.name} value={a.name}>{a.name} ({a.cost} pts)</option>)}
                                            </select>
                                            <div className="text-sm text-slate-600 italic p-3 bg-blue-50 border border-blue-100 rounded">
                                                {REMOTE_ASSETS.find(a => a.name === unit.assetName)?.rule}
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="p-4">
                                            {unit.modules && unit.modules.map((mod, i) => {
                                                const displayIndex = mod.isSlot0 ? 'O' : slotCounter++;
                                                const isFirstMovable = i === 0 || (unit.modules[0].isSlot0 && i === 1);
                                                const isLastMovable = i === unit.modules.length - 1;
                                                return (
                                                    <ModuleEditor 
                                                        key={i} index={i} displayIndex={displayIndex} module={mod} unitType={unit.type}
                                                        isMac={isMac} availableHardware={availableHW} showDoubleOption={variantRules.doubleModules}
                                                        isFirstMovable={isFirstMovable} isLastMovable={isLastMovable}
                                                        onChange={(idx, newMod) => updateModule(unit.id, idx, newMod)} onDelete={(idx) => removeModuleSlot(unit.id, idx)}
                                                        onClone={(idx) => cloneModule(unit.id, idx)} onMoveUp={() => moveModule(unit.id, i, -1)} onMoveDown={() => moveModule(unit.id, i, 1)}
                                                    />
                                                );
                                            })}
                                            {!isMac && (
                                                <button onClick={() => addModuleSlot(unit.id)} className="w-full py-2 border-2 border-dashed border-slate-200 text-slate-400 rounded hover:border-blue-300 hover:text-blue-500 flex justify-center items-center gap-2 transition-colors text-sm font-bold mt-2">
                                                    <div className="flex items-center gap-2"><IconPlus size={16} /> Add Module Slot</div>
                                                </button>
                                            )}
                                        </div>
                                    )}

                                    <div className="bg-slate-50 p-2 flex justify-end gap-2 border-t border-slate-100">
                                        <div className="mr-auto flex items-center px-2 border-r border-slate-200">
