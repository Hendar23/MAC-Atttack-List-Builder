                                            <button onClick={() => moveUnit(unitIndex, -1)} disabled={unitIndex === 0} className={BTN_FOOTER_CLASS} title="Move Unit Up"><IconArrowUp /></button>
                                            <button onClick={() => moveUnit(unitIndex, 1)} disabled={unitIndex === units.length - 1} className={BTN_FOOTER_CLASS} title="Move Unit Down"><IconArrowDown /></button>
                                        </div>
                                        <button onClick={() => exportUnit(unit)} className={BTN_FOOTER_CLASS} title="Export Single Unit"><IconSave size={18} /></button>
                                        <button onClick={() => duplicateUnit(unit)} className={BTN_FOOTER_CLASS} title="Duplicate Unit"><IconCopy /></button>
                                        <button onClick={() => removeUnit(unit.id)} className={`${BTN_FOOTER_CLASS} hover:text-red-600 hover:bg-red-50`} title="Delete Unit"><IconTrash /></button>
                                    </div>
                                </div>
                            );
                        })}

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <button onClick={() => addUnit('MAC2')} className="bg-slate-800 text-white py-4 rounded-lg shadow-sm hover:bg-slate-700 flex justify-center items-center gap-2 font-bold text-lg transition-all">
                                <IconPlus size={24} /> Add New Unit
                            </button>
                            
                            <input type="file" ref={importUnitRef} onChange={handleImportUnit} accept=".json" className="hidden" />
                            <button onClick={() => importUnitRef.current.click()} className="bg-white border-2 border-slate-300 text-slate-700 py-4 rounded-lg shadow-sm hover:bg-slate-50 flex justify-center items-center gap-2 font-bold text-lg transition-all">
                                <IconLoad size={24} /> Import Saved Unit
                            </button>
                        </div>

                        <div className="text-center text-slate-400 text-sm py-8">The Grill - A MAC Attack List Builder</div>
                    </div>

{showHelp && (
    <div className="fixed inset-0 bg-slate-900 bg-opacity-50 flex items-center justify-center p-4 z-50 no-print" onClick={() => setShowHelp(false)}>
        <div className="bg-white rounded shadow-lg max-w-lg w-full p-6 text-sm overflow-y-auto max-h-[90vh]" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
                <h3 className="text-xl font-black text-slate-800">The Grill - A MAC Attack List Builder</h3>
                <span className="text-xs font-bold bg-slate-100 text-slate-500 px-2 py-1 rounded">v1.0</span>
            </div>
            
            <div className="mb-6 space-y-5 text-slate-600">
                <div>
                    <p className="mb-2">
                        <strong>MAC Attack</strong> is a sci-fi miniature wargame designed by <strong>Chris McDowall</strong>. Published by <strong>Bastionland Press</strong>.
                    </p>
                    <p className="mb-4">
                        <a 
                            href="https://bastionlandpress.com/products/mac-attack" 
                            target="_blank" 
                            rel="noopener noreferrer" 
                            className="text-blue-600 hover:text-blue-800 underline font-medium"
                        >
                            Official MAC Attack Page
                        </a>
                    </p>
                    <p className="text-xs italic text-slate-500">
                        This is an unofficial, community-built tool created to support the game.
                    </p>
                </div>
            </div>
            
            <div className="text-center mt-6">
                <button onClick={() => setShowHelp(false)} className="bg-slate-800 text-white py-2 px-6 rounded font-bold hover:bg-slate-700 transition-colors w-full">
                    Close
                </button>
            </div>
        </div>
    </div>
)}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MACBuilder />);
    </script>
</body>
</html>
